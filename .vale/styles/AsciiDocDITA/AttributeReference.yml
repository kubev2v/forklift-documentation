# Report custom attribute references.
#
# Lists all custom attribute references in the file. Use this information
# to decide which attribute definitions to supply during conversion.
---
extends: existence
message: "%s"
level: suggestion
link: https://github.com/jhradilek/asciidoctor-dita-vale/blob/main/README.md#suggestions
scope: raw
nonword: true
tokens:
  - '(?<![\$%])\{([0-9A-Za-z_][0-9A-Za-z_-]*|set:.+?|counter2?:.+?)\}'
exceptions:
  # Character replacement attributes:
  - blank
  - empty
  - sp
  - nbsp
  - zwsp
  - wj
  - apos
  - quot
  - lsquo
  - rsquo
  - ldquo
  - rdquo
  - deg
  - plus
  - brvbar
  - vbar
  - amp
  - lt
  - gt
  - startsb
  - endsb
  - caret
  - asterisk
  - tilde
  - backslash
  - backtick
  - two-colons
  - two-semicolons
  - cpp
  - pp
  # Intrinsic document attributes:
  - backend
  - 'backend-[0-9-A-Za-z_-]+'
  - basebackend
  - 'basebackend-[0-9-A-Za-z_-]+'
  - docdate
  - docdatetime
  - docdir
  - docfile
  - docfilesuffix
  - docname
  - doctime
  - 'doctype-[0-9-A-Za-z_-]+'
  - docyear
  - embedded
  - filetype
  - 'filetype-[0-9-A-Za-z_-]+'
  - htmlsyntax
  - localdate
  - localdatetime
  - localtime
  - localyear
  - outdir
  - outfile
  - outfilesuffix
  - safe-mode-level
  - safe-mode-name
  - safe-mode-unsafe
  - safe-mode-safe
  - safe-mode-server
  - safe-mode-secure
  - user-home
