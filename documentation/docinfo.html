<script>
document.addEventListener("DOMContentLoaded", function() {

  // --- Top navigation bar with active page indicator ---
  var path = window.location.pathname;
  var isDownstream = path.indexOf("/downstream/") !== -1;
  var nav = document.createElement("div");
  nav.id = "fork-nav";
  if (isDownstream) nav.classList.add("fork-nav-downstream");
  var links = [
    { href: "../index.html", text: isDownstream ? "MTV Docs" : "Forklift Docs", cls: "fork-brand" },
    { href: "../doc-Planning_your_migration/master.html", text: "Planning", match: "Planning" },
    { href: "../doc-Migrating_your_virtual_machines/master.html", text: "Migrating", match: "Migrating" },
    { href: "../doc-Release_notes/master.html", text: "Release Notes", match: "Release" }
  ];
  links.forEach(function(l) {
    var a = document.createElement("a");
    a.href = l.href;
    a.textContent = l.text;
    if (l.cls) a.className = l.cls;
    if (l.match && path.indexOf(l.match) !== -1) a.classList.add("active");
    nav.appendChild(a);
  });

  var searchDiv = document.createElement("div");
  searchDiv.id = "fork-search";
  nav.appendChild(searchDiv);

  var ghLink = document.createElement("a");
  ghLink.href = "https://github.com/kubev2v/forklift-documentation";
  ghLink.textContent = "GitHub";
  nav.appendChild(ghLink);

  document.body.insertBefore(nav, document.body.firstChild);

  // --- Initialize Pagefind UI ---
  var pfScript = document.createElement("script");
  pfScript.src = (window.__pagefindBase || "/_pagefind/") + "pagefind-ui.js";
  pfScript.onload = function() {
    new PagefindUI({
      element: "#fork-search",
      showSubResults: true,
      showImages: false,
      resetStyles: false
    });
  };
  document.head.appendChild(pfScript);

  // --- TOC Accordion ---
  var toc = document.getElementById("toc");
  if (!toc) return;

  var chevronSVG = '<svg class="toc-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 4 10 8 6 12"/></svg>';

  var topItems = toc.querySelectorAll(".sectlevel1 > li");
  topItems.forEach(function(li) {
    var childUl = li.querySelector(":scope > ul");
    var link = li.querySelector(":scope > a");
    if (!link) return;

    if (!childUl) {
      li.classList.add("toc-leaf");
      return;
    }

    // Wrap link + chevron in a toggle container
    var toggle = document.createElement("div");
    toggle.className = "toc-toggle";
    toggle.innerHTML = chevronSVG;
    toggle.appendChild(link);
    li.insertBefore(toggle, childUl);

    // Start collapsed
    childUl.classList.add("collapsed");
    childUl.style.maxHeight = "0px";

    var chevron = toggle.querySelector(".toc-chevron");

    toggle.addEventListener("click", function(e) {
      // Allow the link click to navigate; toggle on chevron or whitespace click
      if (e.target === link) return;
      e.preventDefault();
      toggleSection(li);
    });

    // Also toggle when clicking the link
    link.addEventListener("click", function(e) {
      if (childUl.classList.contains("collapsed")) {
        e.preventDefault();
        toggleSection(li);
      }
    });
  });

  function toggleSection(li) {
    var ul = li.querySelector(":scope > .toc-toggle + ul, :scope > ul");
    var chevron = li.querySelector(".toc-chevron");
    if (!ul) return;

    if (ul.classList.contains("collapsed")) {
      ul.classList.remove("collapsed");
      ul.style.maxHeight = ul.scrollHeight + "px";
      if (chevron) chevron.classList.add("open");
    } else {
      ul.style.maxHeight = ul.scrollHeight + "px";
      requestAnimationFrame(function() {
        ul.style.maxHeight = "0px";
        ul.classList.add("collapsed");
      });
      if (chevron) chevron.classList.remove("open");
    }
  }

  function expandSection(li) {
    var ul = li.querySelector(":scope > .toc-toggle + ul, :scope > ul");
    var chevron = li.querySelector(".toc-chevron");
    if (!ul || !ul.classList.contains("collapsed")) return;
    ul.classList.remove("collapsed");
    ul.style.maxHeight = ul.scrollHeight + "px";
    if (chevron) chevron.classList.add("open");
  }

  // --- Scroll-spy: highlight current section, auto-expand its parent ---
  var allTocLinks = toc.querySelectorAll("a[href^='#']");
  var sections = [];
  allTocLinks.forEach(function(a) {
    var id = a.getAttribute("href").slice(1);
    var el = document.getElementById(id);
    if (el) sections.push({ el: el, link: a });
  });

  var rafId = null;
  window.addEventListener("scroll", function() {
    if (rafId) return;
    rafId = requestAnimationFrame(function() {
      rafId = null;
      updateScrollSpy();
    });
  }, { passive: true });

  function updateScrollSpy() {
    var scrollY = window.scrollY + 100;
    var current = null;

    for (var i = sections.length - 1; i >= 0; i--) {
      if (sections[i].el.offsetTop <= scrollY) {
        current = sections[i];
        break;
      }
    }

    // Clear all active states
    allTocLinks.forEach(function(a) { a.classList.remove("toc-active"); });
    topItems.forEach(function(li) { li.classList.remove("toc-section-active"); });

    if (!current) return;
    current.link.classList.add("toc-active");

    // Find and expand the parent sectlevel1 li
    var parentLi = current.link.closest(".sectlevel1 > li");
    if (parentLi) {
      parentLi.classList.add("toc-section-active");
      expandSection(parentLi);

      // Scroll TOC to keep active link visible
      var tocRect = toc.getBoundingClientRect();
      var linkRect = current.link.getBoundingClientRect();
      if (linkRect.top < tocRect.top + 60 || linkRect.bottom > tocRect.bottom - 20) {
        current.link.scrollIntoView({ block: "center", behavior: "smooth" });
      }
    }
  }

  // Initial scroll-spy run
  setTimeout(updateScrollSpy, 100);
});
</script>
